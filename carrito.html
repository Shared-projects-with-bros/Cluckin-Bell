<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluckin Bell | Carrito</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="carrito">
  <header class="site-header">
    <nav class="navbar" aria-label="Navegacion principal">
      <a class="brand" href="index.html">
        <img src="img/Cluckin bell.png" alt="Logo de Cluckin Bell">
        <span>Cluckin Bell</span>
      </a>
      <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="favoritos.html">Favoritos</a></li>
        <li><a href="promos.html">Promos</a></li>
        <li><a href="reservas.html">Reservas</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
      <a class="cart-link" href="carrito.html" aria-current="page" aria-label="Ver carrito">
        Carrito <span class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section page-title">
      <p class="eyebrow">Pedido</p>
      <h1>Carrito</h1>
      <p>Revisa los productos seleccionados antes de continuar.</p>
    </section>
    <section class="section section-tight cart-layout">
      <div id="carrito-lista" class="cart-list"></div>
      <aside class="cart-summary">
        <h2>Resumen</h2>
        <p>Total</p>
        <strong id="carrito-total">$0.00</strong>
        <button class="btn primary" type="button">Finalizar pedido</button>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <strong>Cluckin Bell</strong>
    <span>Tu pedido queda guardado en este navegador.</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
